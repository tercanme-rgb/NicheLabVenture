<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Ideas</title>
<style>
body{font-family:Arial, Helvetica, sans-serif;margin:0;background:#f5f5f5}
.container{max-width:1000px;margin:auto;padding:60px 20px}
h1{font-size:34px;margin-bottom:10px}
.meta{color:#777;margin-bottom:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.card{background:white;padding:24px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
.card h3{margin-top:0;font-size:20px}
.card p{font-size:14px;color:#666}
.actions{margin-top:16px;display:flex;gap:10px}
.button{padding:10px 14px;background:black;color:white;text-decoration:none;border-radius:6px;font-size:14px}
.button.secondary{background:white;color:black;border:1px solid #ddd}
</style>
</head>
<body>
<div class="container">
<h1>Saved Ideas</h1>
<div class="meta">Ideas you bookmarked for later research.</div>
<div class="grid">
<div class="card">
<h3>AI Contract Analyzer</h3>
<p>Tool that explains legal contracts in simple language.</p>
<div class="actions">
<a class="button" href="../reports/ai-contract-analyzer/">Open report</a>
<a class="button secondary" href="../ideas/">Browse more</a>
</div>
</div>
</div>
</div>
</body>
</html>
