<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NicheLab — Sign In</title>

  <!-- Supabase v2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Fonts: Cormorant Garamond (institutional serif) + IBM Plex Mono (terminal data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── RESET & ROOT ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #050507;
      --surface:    #0D0D0F;
      --panel:      #111115;
      --border:     rgba(201,168,76,0.18);
      --border-hi:  rgba(201,168,76,0.55);
      --gold:       #C9A84C;
      --gold-dim:   #9A7C36;
      --text:       #E8E4DC;
      --muted:      #7A7670;
      --error:      #E05252;
      --mono:       'IBM Plex Mono', monospace;
      --serif:      'Cormorant Garamond', Georgia, serif;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--text);
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── BACKGROUND TEXTURE ───────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(201,168,76,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,168,76,0.04) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── TOP NAVIGATION ───────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: rgba(5,5,7,0.85);
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--gold);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--gold); }

    /* ─── MAIN LAYOUT ──────────────────────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 80px 1.5rem 2rem;
    }

    /* ─── LOGIN CARD ───────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.55s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Gold corner accent */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 48px; height: 2px;
      background: var(--gold);
    }

    .card-header {
      padding: 2.5rem 2.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .card-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }

    .card-title {
      font-family: var(--serif);
      font-size: 1.85rem;
      font-weight: 500;
      line-height: 1.2;
      color: var(--text);
    }

    .card-subtitle {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ─── FORM ─────────────────────────────────────────────────── */
    .card-body {
      padding: 2.5rem;
    }

    .field {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.82rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder { color: #3A3830; }

    input:focus {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }

    /* ─── SUBMIT BUTTON ────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      background: var(--gold);
      color: var(--ink);
      border: none;
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 1rem;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      position: relative;
    }

    .btn-primary:hover:not(:disabled) { background: #D4B256; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(5,5,7,0.3);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── ERROR / STATUS ───────────────────────────────────────── */
    #status-msg {
      margin-top: 1.25rem;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      min-height: 1rem;
      text-align: center;
      color: var(--error);
      opacity: 0;
      transition: opacity 0.25s;
    }

    #status-msg.visible { opacity: 1; }
    #status-msg.success { color: var(--gold); }

    /* ─── FOOTER RULE ──────────────────────────────────────────── */
    .card-footer {
      padding: 1.25rem 2.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .lock-icon { color: var(--gold-dim); font-size: 0.7rem; }

    .card-footer p {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ─── BOTTOM BAR ───────────────────────────────────────────── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 1rem 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(5,5,7,0.7);
      backdrop-filter: blur(8px);
      z-index: 50;
    }

    .bottom-bar p {
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .ticker {
      font-size: 0.58rem;
      color: var(--gold-dim);
      letter-spacing: 0.06em;
    }

    @media (max-width: 600px) {
      nav { padding: 0 1.25rem; }
      .nav-links { gap: 1.5rem; }
      .card-header, .card-body { padding: 1.75rem; }
      .card-footer { padding: 1.25rem 1.75rem; }
      .bottom-bar { display: none; }
    }
  </style>
</head>

<body>

  <!-- ── NAVIGATION ──────────────────────────────────────────────── -->
  <nav>
    <a class="nav-logo" href="#">Niche<span>Lab</span></a>
    <ul class="nav-links">
      <li><a href="#">Pricing</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- ── MAIN ────────────────────────────────────────────────────── -->
  <main>
    <div class="card" role="main">

      <div class="card-header">
        <p class="card-eyebrow">Secure Access Portal</p>
        <h1 class="card-title">Intelligence<br/>Platform</h1>
        <p class="card-subtitle">Sign in to access your market intelligence reports.</p>
      </div>

      <div class="card-body">
        <div class="field">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            autocomplete="email"
            placeholder="analyst@firm.com"
            spellcheck="false"
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            autocomplete="current-password"
            placeholder="••••••••••••"
          />
        </div>

        <button class="btn-primary" id="login-btn" type="button">
          <span id="btn-label">Access Platform</span>
          <div class="btn-spinner" id="btn-spinner"></div>
        </button>

        <p id="status-msg" role="alert" aria-live="polite"></p>
      </div>

      <div class="card-footer">
        <span class="lock-icon">⬛</span>
        <p>256-bit encrypted connection &nbsp;·&nbsp; SOC 2 compliant infrastructure</p>
      </div>

    </div>
  </main>

  <!-- ── BOTTOM BAR ──────────────────────────────────────────────── -->
  <div class="bottom-bar">
    <p>© 2025 NicheLab Intelligence. All rights reserved.</p>
    <span class="ticker" id="live-time"></span>
  </div>

  <!-- ── SUPABASE AUTH LOGIC ──────────────────────────────────────── -->
  <script>
    // ─── CONFIG ────────────────────────────────────────────────────
    // IMPORTANT: Replace YOUR_SUPABASE_ANON_KEY with your actual key
    // from Supabase Dashboard → Settings → API → anon / public
    const SUPABASE_URL  = 'https://ctezbazpnqylufhrmcwn.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0aXdkdWxjcXR2a2R1cHNvdG54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzY2NjcsImV4cCI6MjA5MDM1MjY2N30.RawdFhi84Zq95eZ29w8QwXPcBT9VDffFcHMB3fAzITA'; // ← REPLACE THIS

    // ─── CLIENT INIT (with localStorage fix for Web Locks race condition)
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: {
        storage:     window.localStorage,
        autoRefreshToken:  true,
        persistSession:    true,
        detectSessionInUrl: true
      }
    });

    // ─── ANTI-LOOP GUARD ────────────────────────────────────────────
    // If user is already authenticated, send them to vault immediately.
    // This prevents any scenario where a logged-in user lands on login.
    (async () => {
      const { data: { session } } = await _sb.auth.getSession();
      if (session) {
        window.location.replace('vault.html');
      }
    })();

    // ─── DOM REFS ───────────────────────────────────────────────────
    const emailEl   = document.getElementById('email');
    const passEl    = document.getElementById('password');
    const loginBtn  = document.getElementById('login-btn');
    const statusMsg = document.getElementById('status-msg');
    const btnLabel  = document.getElementById('btn-label');
    const btnSpinner= document.getElementById('btn-spinner');

    // ─── HELPERS ────────────────────────────────────────────────────
    function setLoading(on) {
      loginBtn.disabled  = on;
      btnLabel.style.display  = on ? 'none'   : 'block';
      btnSpinner.style.display= on ? 'block'  : 'none';
    }

    function showError(msg) {
      statusMsg.textContent = msg;
      statusMsg.className   = 'visible';
    }

    function showSuccess(msg) {
      statusMsg.textContent = msg;
      statusMsg.className   = 'visible success';
    }

    function clearStatus() {
      statusMsg.textContent = '';
      statusMsg.className   = '';
    }

    // ─── LOGIN HANDLER ──────────────────────────────────────────────
    async function handleLogin() {
      clearStatus();
      const email    = emailEl.value.trim();
      const password = passEl.value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      setLoading(true);

      const { data, error } = await _sb.auth.signInWithPassword({ email, password });

      if (error) {
        setLoading(false);
        // Surface user-friendly messages
        if (error.message.includes('Invalid login')) {
          showError('Invalid email or password. Please try again.');
        } else if (error.message.includes('Email not confirmed')) {
          showError('Please confirm your email address before signing in.');
        } else {
          showError(error.message);
        }
        return;
      }

      // ✅ Login successful
      showSuccess('Authenticated — loading vault…');
      setTimeout(() => {
        window.location.replace('vault.html');
      }, 600);
    }

    // ─── EVENT LISTENERS ────────────────────────────────────────────
    loginBtn.addEventListener('click', handleLogin);

    // Allow Enter key to submit
    [emailEl, passEl].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });

    // Clear errors on typing
    [emailEl, passEl].forEach(el => {
      el.addEventListener('input', clearStatus);
    });

    // ─── LIVE CLOCK ─────────────────────────────────────────────────
    const liveTime = document.getElementById('live-time');
    function updateClock() {
      const now = new Date();
      liveTime.textContent = now.toUTCString().slice(0, -4) + ' UTC';
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
